name: Test API

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'randevubu.server/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: randevubu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './randevubu.server/package-lock.json'

      - name: Install dependencies
        working-directory: ./randevubu.server
        run: npm ci

      - name: Run tests
        working-directory: ./randevubu.server
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/randevubu_test
          REDIS_URL: redis://localhost:6379
        run: npm run test:ci