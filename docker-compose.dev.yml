# 🚀 DEVELOPMENT DOCKER COMPOSE
# Optimized for development with hot reload, debugging, and easy setup

services:
  # Application service (Development)
  app:
    build:
      context: .
      target: development
    container_name: randevubu-dev
    ports:
      - "3001:3001"      # App port for direct access
      - "5556:5555"      # Prisma Studio (when run via make db-studio)
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/randevubu?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis_SDFS45DG

    env_file:
      - .env.development
    volumes:
      - .:/app                    # Hot reload
      - /app/node_modules         # Exclude node_modules
      - /app/dist                 # Exclude dist
    command: sh -c "npx prisma generate && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - randevubu-dev-network
    restart: unless-stopped

  # PostgreSQL Database (Development)
  postgres:
    image: postgres:15-alpine
    container_name: randevubu-postgres-dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=randevubu
    ports:
      - "15432:5432"      # Expose for direct access
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - randevubu-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache (Development)
  redis:
    image: redis:7-alpine
    container_name: randevubu-redis-dev
    ports:
      - "6379:6379"      # Expose for direct access
    volumes:
      - redis_dev_data:/data
    networks:
      - randevubu-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_SDFS45DG", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_SDFS45DG

  # Redis Insight - Redis GUI (Development)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: randevubu-redisinsight-dev
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_dev_data:/data
    networks:
      - randevubu-dev-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Prisma Studio - Database GUI (runs separately from app)
  prisma-studio:
    build:
      context: .
      target: development
    container_name: randevubu-prisma-studio
    ports:
      - "5557:5555"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/randevubu?schema=public
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npx prisma studio --port 5555 --browser none"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - randevubu-dev-network
    restart: unless-stopped
    profiles:
      - tools   # Run with: docker compose --profile tools up -d

  # Nginx (Development - Simple proxy)
  nginx:
    image: nginx:alpine
    container_name: randevubu-nginx-dev
    ports:
      - "8080:80"        # HTTP only for dev (changed from 80 to avoid conflict with Apache)
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - randevubu-dev-network
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  redisinsight_dev_data:
    driver: local

networks:
  randevubu-dev-network:
    driver: bridge


